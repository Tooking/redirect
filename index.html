<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Переход…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔧 КУДА НУЖЕН РЕДИРЕКТ -->
  <script>
    const REDIRECT_URL = "https://jut.su";
  </script>
</head>
<body>

<script>
  try {
    // 1️⃣ создаём "пустой PDF" в памяти
    const pdfBlob = new Blob(
      ["%PDF-1.4\n%EOF"],
      { type: "application/pdf" }
    );

    const url = URL.createObjectURL(pdfBlob);

    // 2️⃣ инициируем скачивание (без кнопки)
    const a = document.createElement("a");
    a.href = url;
    a.download = " ";
    document.body.appendChild(a);
    a.click();

    // 3️⃣ освобождаем память
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) {}

  // 4️⃣ редирект после попытки download
  setTimeout(() => {
    window.location.href = REDIRECT_URL;
  }, 800);
</script>

</body>
</html>
